name: Test VM Image

on:
  workflow_run:
    workflows: ["Build & Release Debian A11y VM"]
    types:
      - completed
  # Allow manual trigger
  workflow_dispatch:

env:
  QCOW2_PATH: output/debian-a11ydevs.qcow2

jobs:
  test:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    # Executa a suíte por grupos para isolar falhas sem misturar logs
    strategy:
      max-parallel: 1
      matrix:
        test-suite:
          - name: "smoke"
            path: "smoke/"
            timeout: 20
            ssh-port: 2222
            ssh-ready-timeout: 300
          - name: "integration"
            path: "integration/"
            timeout: 35
            ssh-port: 2222
            ssh-ready-timeout: 300
          - name: "e2e"
            path: "e2e/"
            timeout: 45
            ssh-port: 2222
            ssh-ready-timeout: 300
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/requirements.txt
      
      - name: Enable KVM acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo chmod 666 /dev/kvm
      
      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils
          qemu-system-x86_64 --version
      
      # Check if QCOW2 exists (from build or artifact)
      - name: Check for existing QCOW2
        id: check_qcow2
        run: |
          if [ -f "${{ env.QCOW2_PATH }}" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "✅ QCOW2 found: ${{ env.QCOW2_PATH }}"
            ls -lh "${{ env.QCOW2_PATH }}"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️  QCOW2 not found: ${{ env.QCOW2_PATH }}"
          fi
      
      # Download QCOW2 from latest release if not exists
      - name: Download QCOW2 from release
        if: steps.check_qcow2.outputs.exists == 'false'
        run: |
          echo "Downloading QCOW2 from matching release..."
          mkdir -p output

          # Wait for release publication/indexing.
          echo "Waiting 60 seconds for release to be fully published..."
          sleep 60

          RELEASES_JSON=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases?per_page=50")

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            TRIGGER_SHA="${{ github.event.workflow_run.head_sha }}"
            TRIGGER_BRANCH="${{ github.event.workflow_run.head_branch }}"

            # For tag-based releases, require exact tag match.
            if [[ "$TRIGGER_BRANCH" == v* ]]; then
              SELECTED_RELEASE=$(echo "$RELEASES_JSON" | jq -c --arg tag "$TRIGGER_BRANCH" '
                map(select(.draft == false and .tag_name == $tag))
                | map(select((.assets // []) | any(.name | endswith(".qcow2") or endswith(".qcow2.xz"))))
                | .[0]
              ')
            else
              # For non-tag runs, require same commit SHA (no fallback to older releases).
              SELECTED_RELEASE=$(echo "$RELEASES_JSON" | jq -c --arg sha "$TRIGGER_SHA" '
                map(select(.draft == false and .target_commitish == $sha))
                | map(select((.assets // []) | any(.name | endswith(".qcow2") or endswith(".qcow2.xz"))))
                | sort_by(.published_at)
                | reverse
                | .[0]
              ')
            fi
          else
            # Manual dispatch: use latest available published release with QCOW2.
            SELECTED_RELEASE=$(echo "$RELEASES_JSON" | jq -c '
              map(select(.draft == false))
              | map(select((.assets // []) | any(.name | endswith(".qcow2") or endswith(".qcow2.xz"))))
              | sort_by(.published_at)
              | reverse
              | .[0]
            ')
          fi

          if [ -z "$SELECTED_RELEASE" ] || [ "$SELECTED_RELEASE" = "null" ]; then
            echo "❌ No matching published release with QCOW2 asset found for this run"
            if [ "${{ github.event_name }}" = "workflow_run" ]; then
              echo "Expected head_sha: ${{ github.event.workflow_run.head_sha }}"
              echo "Expected head_branch: ${{ github.event.workflow_run.head_branch }}"
            fi
            echo "Available releases:"
            echo "$RELEASES_JSON" | jq -r '.[] | [.tag_name, .target_commitish] | @tsv'
            exit 1
          fi

          echo "Selected release:"
          echo "$SELECTED_RELEASE" | jq -r '{tag_name, prerelease, assets: [.assets[].name]}'

          # Try to get compressed (.qcow2.xz) first, fallback to uncompressed (.qcow2)
          DOWNLOAD_URL=$(echo "$SELECTED_RELEASE" | jq -r '.assets[]? | select(.name | endswith(".qcow2.xz")) | .browser_download_url' | head -1)

          if [ -n "$DOWNLOAD_URL" ]; then
            echo "Found compressed QCOW2, downloading from: $DOWNLOAD_URL"
            curl -L -o output/debian-a11ydevs.qcow2.xz "$DOWNLOAD_URL"
            echo "Decompressing..."
            xz -d output/debian-a11ydevs.qcow2.xz
          else
            # Try uncompressed
            DOWNLOAD_URL=$(echo "$SELECTED_RELEASE" | jq -r '.assets[]? | select(.name | endswith(".qcow2")) | .browser_download_url' | head -1)

            if [ -z "$DOWNLOAD_URL" ]; then
              echo "❌ Selected release has no QCOW2 asset"
              echo "Available assets:"
              echo "$SELECTED_RELEASE" | jq -r '.assets[]?.name'
              exit 1
            fi

            echo "Found uncompressed QCOW2, downloading from: $DOWNLOAD_URL"
            curl -L -o "${{ env.QCOW2_PATH }}" "$DOWNLOAD_URL"
          fi
          
          echo "✅ QCOW2 ready"
          ls -lh "${{ env.QCOW2_PATH }}"
      
      - name: Verify QCOW2 integrity
        run: |
          echo "Verifying QCOW2 file..."
          qemu-img info "${{ env.QCOW2_PATH }}"
          qemu-img check "${{ env.QCOW2_PATH }}"
      
      - name: Run ${{ matrix.test-suite.name }} test group
        timeout-minutes: ${{ matrix.test-suite.timeout }}
        run: |
          cd tests
          pytest ${{ matrix.test-suite.path }} \
            -v \
            --tb=short \
            --timeout=180 \
            --qcow2=../${{ env.QCOW2_PATH }} \
            --ssh-port=${{ matrix.test-suite.ssh-port }} \
            --ssh-ready-timeout=${{ matrix.test-suite.ssh-ready-timeout }} \
            --vm-memory=1536 \
            --vm-cpus=1 \
            --junitxml=../test-results-${{ matrix.test-suite.name }}.xml \
            --html=../test-report-${{ matrix.test-suite.name }}.html \
            --self-contained-html
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.test-suite.name }}
          path: |
            test-results-${{ matrix.test-suite.name }}.xml
            test-report-${{ matrix.test-suite.name }}.html
          retention-days: 30
      
      - name: Publish test summary
        if: always()
        uses: test-summary/action@v2
        with:
          paths: test-results-${{ matrix.test-suite.name }}.xml

  # Job to check all test suites passed
  test-summary:
    runs-on: ubuntu-latest
    needs: test
    if: always() && needs.test.result != 'skipped'
    
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ Tests failed"
            exit 1
          fi
          echo "✅ All tests passed"
      
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ needs.test.result }}';
            const emoji = result === 'success' ? '✅' : '❌';
            const message = result === 'success' 
              ? 'All VM tests passed successfully!' 
              : 'Some VM tests failed. Check the workflow logs for details.';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${emoji} **VM Test Results**\n\n${message}\n\nView detailed results in the [workflow run](${context.payload.repository.html_url}/actions/runs/${context.runId}).`
            });

  # Block release if tests fail (on tag push)
  block-release:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_run' && startsWith(github.event.workflow_run.head_branch, 'v') && needs.test.result != 'skipped'
    
    steps:
      - name: Check test results for release
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ Cannot create release: tests failed"
            exit 1
          fi
          echo "✅ Tests passed - release can proceed"
