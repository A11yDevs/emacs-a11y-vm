# ==============================================================================
# preseed.cfg — Instalação desassistida do Debian para build via Packer/QEMU
#
# Equivalente ao preseed gerado pelo setup-vm.sh, mas com valores fixos
# adequados para uma imagem de release redistribuível.
#
# IMPORTANTE: as credenciais padrão (a11ydevs / a11ydevs) devem ser alteradas
# pelo usuário após importar a VM.
# ==============================================================================

# --- Localização -------------------------------------------------------------
d-i debian-installer/locale string pt_BR.UTF-8
d-i keyboard-configuration/xkb-keymap select br
d-i keyboard-configuration/layoutcode string br
d-i console-setup/ask_detect boolean false

# --- Rede --------------------------------------------------------------------
d-i netcfg/choose_interface select auto
d-i netcfg/hostname string debian-a11ydevs
d-i netcfg/get_domain string local

# --- Mirror ------------------------------------------------------------------
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# --- Contas ------------------------------------------------------------------
d-i passwd/root-login boolean true
d-i passwd/root-password password a11ydevs
d-i passwd/root-password-again password a11ydevs
d-i passwd/user-fullname string A11y Devs
d-i passwd/username string a11ydevs
d-i passwd/user-password password a11ydevs
d-i passwd/user-password-again password a11ydevs

# --- Relógio -----------------------------------------------------------------
d-i clock-setup/utc boolean true
d-i time/zone string America/Sao_Paulo

# --- Particionamento — disco inteiro, partição única -------------------------
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# --- Pacotes — apenas sistema base (sem desktop/GUI) -------------------------
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string espeakup espeak-ng sudo emacs git
d-i pkgsel/upgrade select full-upgrade

# --- GRUB --------------------------------------------------------------------
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

# --- Pós-instalação ----------------------------------------------------------
# Configura speakup.synth=soft no GRUB, habilita espeakup no boot,
# adiciona usuário ao grupo sudo, configura sudo sem senha (para automação),
# e habilita autenticação SSH por senha (necessário para que o Packer conecte).
d-i preseed/late_command string \
    in-target sed -i 's/^GRUB_CMDLINE_LINUX_DEFAULT=.*/GRUB_CMDLINE_LINUX_DEFAULT=""/' /etc/default/grub; \
    in-target sed -i 's/^GRUB_TIMEOUT=.*/GRUB_TIMEOUT=1/' /etc/default/grub; \
    in-target sh -c 'mkdir -p /etc/default/grub.d && printf "GRUB_CMDLINE_LINUX=\"net.ifnames=0 biosdevname=0 speakup.synth=soft\"\n" > /etc/default/grub.d/10-a11y.cfg'; \
    in-target update-grub; \
    in-target systemctl enable espeakup; \
    in-target usermod -aG sudo a11ydevs; \
    echo 'a11ydevs ALL=(ALL) NOPASSWD:ALL' > /target/etc/sudoers.d/a11ydevs; \
    chmod 0440 /target/etc/sudoers.d/a11ydevs; \
    in-target sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config; \
    in-target sh -c 'mkdir -p /etc/ssh/sshd_config.d && echo "PasswordAuthentication yes" > /etc/ssh/sshd_config.d/10-packer.conf'

# --- Finalizar ---------------------------------------------------------------
d-i finish-install/reboot_in_progress note
