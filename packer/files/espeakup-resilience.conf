# /etc/systemd/system/espeakup.service.d/resilience.conf
# Reinicia automaticamente espeakup em caso de falha
#
# Configuração crítica para acessibilidade: usuários cegos dependem 100%
# da síntese de voz. Falhas devem ser recuperadas automaticamente.

[Service]
# Reiniciar automaticamente em caso de falha
Restart=on-failure

# Aguardar 3 segundos antes de reiniciar
RestartSec=3s

# Limitar tentativas: 5 reinícios em 120 segundos
StartLimitInterval=120s
StartLimitBurst=5
