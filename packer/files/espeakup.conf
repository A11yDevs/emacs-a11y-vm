# Configuração do espeakup para usar voz em português brasileiro
# Este arquivo é carregado pelo serviço espeakup.service

# Voz em português brasileiro (padrão: en)
# A variável correta é default_voice (minúsculas com underscore)
default_voice=pt-br

# Taxa de fala (range: 0-9, padrão: 5)
# Valores menores = mais lento, maiores = mais rápido
# Valor recomendado para acessibilidade: 2
default_rate=2

# Volume (range: 0-9, padrão: 5)
default_volume=5

# Pitch/Tom (range: 0-9, padrão: 5)
# Valores menores = voz mais grave, maiores = mais aguda
default_pitch=5
