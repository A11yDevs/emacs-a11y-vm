[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test directories
testpaths = smoke integration e2e

# Console output
console_output_style = progress
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers
markers =
    smoke: Fast validation tests (~2min)
    integration: Functional tests (~10min)
    e2e: End-to-end workflow tests (~20min)
    slow: Slow tests (may take several minutes)

# Timeout
timeout = 300

# Log level
log_cli = false
log_cli_level = INFO
log_file = pytest.log
log_file_level = DEBUG

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
